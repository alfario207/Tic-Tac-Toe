            </div>

                <div class="mark"></div>

                <div class="mark"></div> 
                <div class="mark"></div> 
                <div class="mark"></div> 
                <div class="mark"></div> 
                <div class="mark"></div> 
            </div>
            <div class="restart">
                <button id="restart-btn">Restart</button>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
</body>
